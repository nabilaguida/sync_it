name: sync_it
description: >-
  Offline-first synchronization engine: persistent outbox with
  dependency-ordered replay, retry policies, and pull replication of
  server collections. Pure Dart — storage and connectivity are injected.
version: 0.2.1
repository: https://github.com/nabilaguida/sync_it
homepage: https://github.com/nabilaguida/sync_it
issue_tracker: https://github.com/nabilaguida/sync_it/issues

topics:
  - offline
  - sync
  - outbox
  - replication
  - state-management

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  logging: ^1.2.0
  equatable: ^2.0.5
  uuid: ^4.0.0

dev_dependencies:
  test: ^1.25.2
