# Publishes sync_it to pub.dev when a version tag (e.g. v0.2.1) is pushed.
#
# Setup (one-time, on pub.dev → your package → Admin → Automated publishing):
#   - Enable "Publishing from GitHub Actions"
#   - Repository: nabilaguida/sync_it
#   - Tag pattern: v{{version}}
#
# Release flow afterwards:
#   1. Bump `version:` in pubspec.yaml + add a CHANGELOG entry, commit, push.
#   2. git tag v0.2.1 && git push origin v0.2.1
#   The tag must match the pubspec version, or the publish step fails.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Gate the release on a green test run — publish only proceeds if this passes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart test

  publish:
    needs: test
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev.
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
